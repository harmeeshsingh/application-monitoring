---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-app
  labels:
    app: self-healing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: self-healing
  template:
    metadata:
      labels:
        app: self-healing
    spec:
      containers:
      - name: self-healing-container
        image: nginx
        ports:
        - containerPort: 80
        resources:
          requests:
           cpu: "100m"
          limits:
           cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 3